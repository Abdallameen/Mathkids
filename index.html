<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Math Adventure World ✦ play</title>
    <style>
        /* [نفس الستايل الخاص بك مع تحسينات بسيطة للتجاوب] */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #2b1b4e 0%, #1b2b5e 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 12px; overflow-x: hidden;
        }
        #app {
            position: relative; z-index: 10; width: 100%; max-width: 420px;
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px);
            border-radius: 40px; box-shadow: 0 25px 50px -8px rgba(0,0,0,0.6);
            overflow: hidden; border: 1px solid rgba(255,255,240,0.15);
        }
        .screen { display: none; padding: 24px 20px; flex-direction: column; gap: 20px; min-height: 600px; }
        .screen.active { display: flex; animation: fadeSlide 0.3s ease-out; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .top-bar { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 50px; }
        .coin-badge { background: #f5b81b; padding: 5px 15px; border-radius: 20px; color: #222; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-btn { 
            background: rgba(255,255,255,0.1); padding: 20px; border-radius: 25px; 
            text-align: center; color: #fff; cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1);
        }
        .menu-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }
        
        input { width: 100%; padding: 15px; border-radius: 15px; border: none; outline: none; text-align: center; font-size: 1.5rem; }
        button { padding: 15px; border-radius: 15px; border: none; background: #6366f1; color: white; font-weight: bold; cursor: pointer; }
        button:active { opacity: 0.8; }
        
        /* Floating background shapes */
        .float-bg span { position: absolute; background: rgba(255,255,255,0.03); border-radius: 50%; animation: float 15s infinite linear; }
        @keyframes float { from { transform: translateY(100vh) rotate(0); } to { transform: translateY(-10vh) rotate(360deg); } }
    </style>
</head>
<body>

<div class="float-bg" id="floatingBg"></div>
<div id="app"></div>
<canvas id="confettiCanvas" style="position:fixed; top:0; left:0; pointer-events:none; z-index:100;"></canvas>

<script>
(function() {
    const STORAGE_KEY = 'math_adventure_v1';
    const state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
        coins: 50, level: 1, xp: 0, playerName: 'Explorer', character: '🐰',
        stats: { correct: 0, total: 0 }
    };

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    const sounds = {
        play(freq, type="sine") {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.5);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.5);
        },
        success() { this.play(880); },
        error() { this.play(200, "sawtooth"); },
        click() { this.play(440); }
    };

    function render() {
        const app = document.getElementById('app');
        // شاشة القائمة الرئيسية
        const homeHTML = `
            <div id="screen-home" class="screen active">
                <div class="top-bar">
                    <div class="avatar-small">${state.character}</div>
                    <div class="coin-badge">🪙 ${state.coins}</div>
                    <div style="color:white">Lv.${state.level}</div>
                </div>
                <h1 style="color:#f5e57a; text-align:center; margin: 20px 0;">Math World</h1>
                <div class="grid-menu">
                    <div class="menu-btn" onclick="router.go('addition')"><span>➕</span>< desert>Addition</div>
                    <div class="menu-btn" onclick="router.go('profile')"><span>👤</span> Profile</div>
                </div>
            </div>
        `;

        // شاشة الجمع
        const additionHTML = `
            <div id="screen-addition" class="screen">
                <button onclick="router.go('home')">⬅ Back</button>
                <div style="text-align:center; color:white;">
                    <h2 id="quest">? + ?</h2>
                    <input type="number" id="ansInput" placeholder="Answer..." inputmode="numeric">
                    <button onclick="checkAns()" style="width:100%; margin-top:10px; background:#22c55e;">Check</button>
                    <p id="feedback" style="margin-top:10px;"></p>
                </div>
            </div>
        `;

        // شاشة البروفايل
        const profileHTML = `
            <div id="screen-profile" class="screen">
                <button onclick="router.go('home')">⬅ Back</button>
                <div style="color:white; text-align:center;">
                    <h3>Player: ${state.playerName}</h3>
                    <p>Correct Answers: ${state.stats.correct}</p>
                    <button onclick="resetGame()" style="background:#ef4444; margin-top:20px;">Reset All Progress</button>
                </div>
            </div>
        `;

        app.innerHTML = homeHTML + additionHTML + profileHTML;
    }

    window.router = {
        go(screenId) {
            sounds.click();
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + screenId).classList.add('active');
            if(screenId === 'addition') nextQuest();
        }
    };

    let currentAns = 0;
    function nextQuest() {
        const n1 = Math.floor(Math.random() * 10 * state.level);
        const n2 = Math.floor(Math.random() * 10 * state.level);
        currentAns = n1 + n2;
        document.getElementById('quest').innerText = `${n1} + ${n2} = ?`;
        document.getElementById('ansInput').value = '';
    }

    window.checkAns = function() {
        const val = parseInt(document.getElementById('ansInput').value);
        const feedback = document.getElementById('feedback');
        if(val === currentAns) {
            state.coins += 5; state.stats.correct++;
            feedback.innerText = "Excellent! +5🪙"; feedback.style.color = "#4ade80";
            sounds.success(); save(); render(); router.go('addition');
        } else {
            feedback.innerText = "Try again!"; feedback.style.color = "#f87171";
            sounds.error();
        }
    };

    window.resetGame = function() {
        if(confirm("Are you sure?")) {
            localStorage.clear(); location.reload();
        }
    };

    // Init
    render();
    // Background animation particles
    const bg = document.getElementById('floatingBg');
    for(let i=0; i<15; i++) {
        const s = document.createElement('span');
        s.style.width = s.style.height = Math.random()*50+20+'px';
        s.style.left = Math.random()*100+'%';
        s.style.animationDelay = Math.random()*10+'s';
        bg.appendChild(s);
    }
})();
</script>
</body>
</html>
