<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Math Adventure World ✦ play</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #2b1b4e 0%, #1b2b5e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            position: relative;
            overflow-x: hidden;
        }
        /* floating background shapes (particles) */
        .float-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }
        .float-bg span {
            position: absolute;
            display: block;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.03);
            border-radius: 60% 40% 70% 30%;
            animation: floatAnim 18s infinite ease-in-out;
        }
        @keyframes floatAnim {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-120px) rotate(180deg); }
            100% { transform: translateY(0px) rotate(360deg); }
        }
        /* main app container – mobile card */
        #app {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px 48px 40px 40px;
            box-shadow: 0 25px 50px -8px rgba(0,0,0,0.6), 0 0 0 2px rgba(255,255,240,0.1);
            overflow: hidden;
            border: 1px solid rgba(255,255,240,0.15);
            transition: background 0.3s ease;
        }
        .screen {
            display: none;
            padding: 24px 20px 28px;
            flex-direction: column;
            gap: 22px;
            min-height: 680px;
            transition: opacity 0.2s, transform 0.25s;
        }
        .screen.active {
            display: flex;
            animation: fadeSlide 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
        }
        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateX(20px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        /* top bar */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.25);
            padding: 8px 14px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,200,0.2);
        }
        .avatar-small {
            width: 44px;
            height: 44px;
            background: #c58aff;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            transition: all 0.2s;
        }
        .coin-badge {
            background: #f5b81b;
            padding: 6px 16px 6px 12px;
            border-radius: 40px;
            font-weight: 700;
            color: #2a1f3a;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1.2rem;
            box-shadow: 0 4px 0 #b57c00;
        }
        .level-badge {
            background: #4e2e9b;
            padding: 6px 12px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid #bb9cff;
        }
        /* buttons grid */
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 12px;
        }
        .menu-btn {
            background: rgba(20, 15, 45, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 235, 150, 0.3);
            border-radius: 32px;
            padding: 24px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            font-size: 1.3rem;
            font-weight: 600;
            color: #ffefc0;
            box-shadow: 0 12px 0 #0c0822, 0 8px 20px rgba(0,0,0,0.6);
            transition: all 0.08s linear;
            cursor: pointer;
        }
        .menu-btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #0c0822, 0 8px 18px black;
        }
        .menu-btn span { font-size: 2.4rem; }
        /* shared components */
        .ladder-box, .addition-box {
            background: rgba(0,0,0,0.3);
            border-radius: 60px;
            padding: 24px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .ladder-steps {
            display: flex;
            flex-direction: column-reverse;
            gap: 8px;
            width: 100%;
            align-items: center;
            margin: 20px 0;
        }
        .step {
            width: 70%;
            background: #423e6b;
            padding: 14px 20px;
            border-radius: 60px;
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            color: white;
            box-shadow: inset 0 -4px 0 #1c1935, 0 8px 0 #0e0c1f;
            transition: 0.1s;
        }
        .step.current {
            background: #febf28;
            color: #221c3a;
            box-shadow: 0 0 24px #f9d77e, inset 0 -4px 0 #b57c00, 0 8px 0 #8f5f10;
            transform: scale(1.02);
        }
        .counter-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .chip {
            background: #25203e;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #827eac;
        }
        .big-number {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1;
        }
        /* addition circles */
        .circle-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .circle {
            width: 110px;
            height: 110px;
            border-radius: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2.6rem;
            font-weight: 700;
            color: white;
            box-shadow: 0 16px 0 rgba(0,0,0,0.2);
            transition: 0.1s;
        }
        .circle.blue { background: #4180c4; }
        .circle.orange { background: #e78b38; }
        /* shop items */
        .shop-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .shop-item {
            background: #2b2350;
            border-radius: 40px;
            padding: 18px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            border: 2px solid transparent;
            transition: 0.1s;
            color: #f9e57c;
        }
        .shop-item.owned { border-color: #ffd966; background: #3f3470; }
        .price { font-size: 1.2rem; background: #00000055; padding: 4px 12px; border-radius: 30px; }
        /* achievement grid */
        .achieve-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .achieve-item {
            background: #1e193b;
            border-radius: 30px;
            padding: 16px 4px;
            text-align: center;
            color: #fff;
            opacity: 0.5;
        }
        .achieve-item.unlocked { opacity: 1; background: #4d3d8c; box-shadow: 0 0 0 2px gold; }
        /* profile stats */
        .stat-row {
            display: flex;
            justify-content: space-between;
            background: #00000040;
            padding: 16px 20px;
            border-radius: 40px;
            font-size: 1.2rem;
        }
        input {
            background: #302b51;
            border: none;
            padding: 16px 20px;
            border-radius: 50px;
            color: white;
            font-size: 1.2rem;
            width: 100%;
        }
        button {
            background: #7359d1;
            border: none;
            padding: 18px 20px;
            border-radius: 60px;
            font-weight: 700;
            color: white;
            font-size: 1.2rem;
            box-shadow: 0 8px 0 #3f2e81;
            transition: 0.05s linear;
            cursor: pointer;
        }
        button:active { transform: translateY(5px); box-shadow: 0 3px 0 #3f2e81; }
        .xp-bar {
            height: 20px;
            background: #181530;
            border-radius: 30px;
            overflow: hidden;
            width: 100%;
        }
        .xp-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #b16ef0, #f5d76e);
            border-radius: 30px;
            transition: width 0.4s ease;
        }
        .particle-confetti { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 999; }
    </style>
</head>
<body>
<div class="float-bg" id="floatingBg"></div>
<div id="app" data-theme="default"></div>
<canvas id="confettiCanvas" class="particle-confetti" style="position:fixed; top:0; left:0; width:100%; height:100%;"></canvas>
<script>
(function(){
    // -------------------- STATE & PERSISTENCE --------------------
    const STORAGE_KEY = 'mathAdventureWorld';
    const defaultState = {
        coins: 50,
        level: 2,
        xp: 35,
        maxLevel: 5,
        playerName: 'Explorer',
        character: 'bunny',
        theme: 'default',
        ownedItems: { characters: ['bunny'], themes: ['default'], soundPacks: ['classic'] },
        selectedSound: 'classic',
        achievements: [],
        stats: { gamesPlayed: 0, correct: 0, totalAnswers: 0, coinsEarned: 0 },
        ladderMode: { unlocked: [true,true,false,false], stars: [0,0,0,0] },
        additionCombo: 0,
        inventory: {}
    };

    let state = JSON.parse(JSON.stringify(defaultState));
    try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            const loaded = JSON.parse(saved);
            state = { ...defaultState, ...loaded, ownedItems: { ...defaultState.ownedItems, ...loaded.ownedItems } };
        }
    } catch (e) {}

    function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    // -------------------- AUDIO (tiny embedded) --------------------
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playTone(type, freq, duration, vol=0.1) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = vol;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    const sounds = {
        click: () => playTone('sine', 600, 0.07, 0.06),
        success: () => { playTone('sine', 880, 0.1); playTone('sine', 1200, 0.15, 0.05); },
        error: () => playTone('sawtooth', 300, 0.15, 0.07),
        purchase: () => { playTone('sine', 500, 0.08); playTone('sine', 800, 0.1, 0.08); },
        celebrate: () => { playTone('triangle', 700, 0.1); playTone('sine', 1100, 0.2, 0.1); },
        jump: () => playTone('sine', 400, 0.05, 0.05)
    };

    // -------------------- CONFETTI (simple canvas) --------------------
    const canvas = document.getElementById('confettiCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();

    function addConfetti(amount=20) {
        for (let i=0; i<amount; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: -20,
                size: 8+Math.random()*12,
                color: `hsl(${Math.random()*360}, 80%, 60%)`,
                speedY: 3+Math.random()*7,
                speedX: -2+Math.random()*4,
                life: 1
            });
        }
        if (!confettiFrame) requestAnimationFrame(animateConfetti);
    }
    let confettiFrame;
    function animateConfetti() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        let anyAlive = false;
        for (let p of particles) {
            p.x += p.speedX;
            p.y += p.speedY;
            p.life -= 0.003;
            if (p.life <= 0 || p.y > canvas.height+50) continue;
            anyAlive = true;
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.size*0.8, p.size*0.4);
        }
        particles = particles.filter(p => p.life > 0 && p.y < canvas.height+50);
        if (anyAlive) { confettiFrame = requestAnimationFrame(animateConfetti); } else { confettiFrame = null; }
    }

    // -------------------- SCREEN MANAGER --------------------
    const screens = {
        home: document.getElementById('screen-home'),
        ladder: document.getElementById('screen-ladder'),
        addition: document.getElementById('screen-addition'),
        shop: document.getElementById('screen-shop'),
        achievements: document.getElementById('screen-achievements'),
        profile: document.getElementById('screen-profile')
    };
    function showScreen(name) {
        Object.values(screens).forEach(s => { if(s) s.classList.remove('active'); });
        if (screens[name]) screens[name].classList.add('active');
        sounds.click();
        if (name==='home') updateHomeUI();
        if (name==='ladder') enterLadder();
        if (name==='addition') enterAddition();
        if (name==='shop') renderShop();
        if (name==='achievements') renderAchievements();
        if (name==='profile') renderProfile();
    }

    // -------------------- HOME (avatar, coins, level) --------------------
    function updateHomeUI() {
        document.querySelectorAll('.coin-display').forEach(el => el.innerText = state.coins);
        document.querySelectorAll('.level-num').forEach(el => el.innerText = state.level);
        const avatar = document.getElementById('avatarHome');
        if (avatar) {
            const chars = { bunny:'🐰', robot:'🤖', dino:'🦖', astronaut:'👨‍🚀' };
            avatar.innerText = chars[state.character] || '🐰';
        }
    }

    // -------------------- LADDER MODE (simplified advanced) --------------------
    let ladderCurrentStep = 1;
    let ladderTarget = null, ladderMode = 'free', ladderTimer = null, ladderTimeLeft = 30;
    function enterLadder() {
        const maxNum = state.level >= 3 ? 20 : (state.level>=2 ? 10 : 5);
        ladderCurrentStep = Math.min(ladderCurrentStep, maxNum);
        renderLadder(maxNum);
    }
    function renderLadder(max) {
        const container = document.getElementById('ladderSteps');
        if (!container) return;
        let html = '';
        for (let i=max; i>=1; i--) {
            html += `<div class="step ${i===ladderCurrentStep ? 'current' : ''}" data-step="${i}">${i}</div>`;
        }
        container.innerHTML = html;
        document.getElementById('ladderCoin').innerText = state.coins;
    }
    window.ladderJump = function(step) {
        if (step < 1) return;
        const max = state.level>=3 ? 20 : (state.level>=2?10:5);
        if (step>max) step = 1;
        ladderCurrentStep = step;
        sounds.jump();
        renderLadder(max);
        if (ladderMode==='target' && ladderTarget===step) {
            sounds.success(); state.coins+=5; state.stats.coinsEarned+=5; updateHomeUI(); addConfetti(10);
            ladderTarget = null; document.getElementById('ladderModeInfo').innerText = 'Target reached! +5🪙';
        }
    };
    window.startFreeLadder = () => { ladderMode='free'; ladderTarget=null; document.getElementById('ladderModeInfo').innerText = 'Free explore'; };
    window.startTargetLadder = () => { 
        const max = state.level>=3 ? 20 : (state.level>=2?10:5);
        ladderTarget = Math.floor(Math.random()*(max-1))+2; 
        ladderMode='target'; document.getElementById('ladderModeInfo').innerText = `Reach ${ladderTarget}!`;
    };
    window.startSpeedLadder = () => {
        ladderMode='speed'; ladderTimeLeft=30; if(ladderTimer)clearInterval(ladderTimer);
        ladderTimer = setInterval(()=>{ ladderTimeLeft--; document.getElementById('ladderModeInfo').innerText=`⏱️${ladderTimeLeft}s`; if(ladderTimeLeft<=0){ clearInterval(ladderTimer); sounds.celebrate(); } },1000);
    };

    // -------------------- ADDITION QUEST --------------------
    let addA=3, addB=2, combo=0;
    function enterAddition() {
        genAddition();
    }
    function genAddition() {
        const max = state.level>=5 ? 30 : (state.level>=3 ? 20 : 10);
        addA = Math.floor(Math.random() * max) + 3;
        addB = Math.floor(Math.random() * Math.min(9, addA-1)) + 1;
        if (addB > addA) [addA, addB] = [addB, addA];
        document.getElementById('addNum1').innerText = addA;
        document.getElementById('addNum2').innerText = addB;
        document.getElementById('addResult').value = '';
        document.getElementById('addFeedback').innerText = '';
    }
    window.checkAddition = function() {
        const inp = document.getElementById('addResult');
        const ans = parseInt(inp.value,10);
        if (ans === addA+addB) {
            sounds.success();
            combo++;
            let coinEarn = 5;
            if (combo>=3) coinEarn = 10;
            if (combo>=5) { coinEarn=15; addConfetti(15); document.getElementById('addFeedback').innerText='🌟 COMBO MASTER!'; }
            else document.getElementById('addFeedback').innerText='✔️ Great!';
            state.coins += coinEarn; state.stats.correct++; updateHomeUI();
            genAddition();
        } else {
            sounds.error();
            combo=0;
            document.getElementById('addFeedback').innerText='❌ Try again!';
            inp.style.transform='translateX(4px)'; setTimeout(()=>inp.style.transform='',100);
        }
        state.stats.totalAnswers++;
        saveState();
    };
    window.hintAddition = function() {
        if(state.coins>=1){ state.coins--; sounds.purchase; document.getElementById('addFeedback').innerText=`💡 sum ${addA+addB}`; } 
        else document.getElementById('addFeedback').innerText='no coins';
        updateHomeUI();
    };

    // -------------------- SHOP --------------------
    const shopItems = {
        characters: { bunny:0, robot:50, dino:100, astronaut:150 },
        themes: { default:0, space:80, jungle:120, candy:150 },
        soundpacks: { classic:0, arcade:60, softpiano:70 }
    };
    function renderShop() {
        const container = document.getElementById('shopContainer');
        if(!container) return;
        let html='';
        for (let [cat, items] of Object.entries(shopItems)) {
            for (let [name, price] of Object.entries(items)) {
                const owned = (cat==='characters' && state.ownedItems.characters.includes(name)) ||
                             (cat==='themes' && state.ownedItems.themes.includes(name)) ||
                             (cat==='soundpacks' && state.ownedItems.soundPacks.includes(name));
                html += `<div class="shop-item ${owned?'owned':''}" data-cat="${cat}" data-item="${name}" data-price="${price}">
                    <span style="font-size:2.5rem;">${name==='bunny'?'🐰':name==='robot'?'🤖':name==='dino'?'🦖':name==='astronaut'?'👨‍🚀':name==='default'?'☁️':name==='space'?'🚀':name==='jungle'?'🌴':name==='candy'?'🍭':name==='classic'?'🔔':name==='arcade'?'👾':'🎹'}</span>
                    <div>${name}</div>
                    <div class="price">${owned?'✓ owned':price+'🪙'}</div>
                </div>`;
            }
        }
        container.innerHTML = html;
        document.querySelectorAll('.shop-item').forEach(el => {
            el.addEventListener('click', (e) => {
                const cat = el.dataset.cat; const item = el.dataset.item; const price = parseInt(el.dataset.price,10);
                let ownedArr = cat==='characters'? state.ownedItems.characters : cat==='themes'? state.ownedItems.themes : state.ownedItems.soundPacks;
                if (ownedArr.includes(item)) {
                    if(cat==='characters') state.character = item;
                    if(cat==='themes') { state.theme = item; applyTheme(item); }
                    sounds.click;
                } else if (state.coins >= price) {
                    state.coins -= price; state.stats.coinsEarned += price;
                    ownedArr.push(item); sounds.purchase(); addConfetti(10);
                    if(cat==='characters') state.character = item;
                    if(cat==='themes') { state.theme = item; applyTheme(item); }
                    saveState(); renderShop(); updateHomeUI();
                } else { sounds.error(); }
            });
        });
    }
    function applyTheme(theme) {
        const appDiv = document.getElementById('app');
        if (theme==='space') appDiv.style.background='linear-gradient(145deg,#0f0926,#2a1e4a)';
        else if (theme==='jungle') appDiv.style.background='linear-gradient(145deg,#1e4a2a,#3b6b3b)';
        else if (theme==='candy') appDiv.style.background='linear-gradient(145deg,#ffb7c5,#b88cb0)';
        else appDiv.style.background='rgba(255, 255, 255, 0.08)';
    }

    // -------------------- ACHIEVEMENTS --------------------
    function renderAchievements() {
        const list = document.getElementById('achieveList');
        const all = ['firstWin','10correct','5combo','100coins','ladderMaster'];
        const unlocked = state.achievements || [];
        list.innerHTML = all.map(a => `<div class="achieve-item ${unlocked.includes(a)?'unlocked':''}">${a}</div>`).join('');
    }

    // -------------------- PROFILE --------------------
    function renderProfile() {
        document.getElementById('profileName').value = state.playerName;
        document.getElementById('profileLevel').innerText = state.level;
        document.getElementById('profileCoinsTotal').innerText = state.stats.coinsEarned;
        document.getElementById('profileGames').innerText = state.stats.gamesPlayed;
        const acc = state.stats.totalAnswers? Math.round(state.stats.correct/state.stats.totalAnswers*100) : 0;
        document.getElementById('profileAccuracy').innerText = acc+'%';
    }
    window.saveProfileName = function() {
        const newName = document.getElementById('profileName').value;
        if (newName) state.playerName = newName; saveState(); sounds.click;
    };
    window.resetProgress = function() {
        if(confirm('erase all progress?')){ state = JSON.parse(JSON.stringify(defaultState)); saveState(); updateHomeUI(); showScreen('home'); }
    };

    // -------------------- INITIALIZATION --------------------
    window.addEventListener('load', ()=>{
        for (let i=0;i<12;i++) {
            let sp = document.createElement('span');
            sp.style.left = Math.random()*100+'%';
            sp.style.top = Math.random()*100+'%';
            sp.style.width = (20+Math.random()*60)+'px';
            sp.style.animationDuration = (10+Math.random()*20)+'s';
            document.getElementById('floatingBg').appendChild(sp);
        }
        showScreen('home');
        updateHomeUI();
        saveState();
    });

    // expose to window
    window.showScreen = showScreen;
    window.ladderJumpUp = () => ladderJump(ladderCurrentStep+1);
    window.ladderJumpDown = () => ladderJump(ladderCurrentStep-1);

    // manual HTML screens injection
    document.getElementById('app').innerHTML = `
        <div id="screen-home" class="screen active">
            <div class="top-bar"><div class="avatar-small" id="avatarHome">🐰</div><div class="coin-badge"><span>🪙</span><span class="coin-display">0</span></div><div class="level-badge"><span>Lv.</span><span class="level-num">1</span></div></div>
            <div style="font-size:2.5rem;font-weight:800; text-align:center; color:#f5e57a; text-shadow:0 6px 0 #7f5d38;">Math Adventure</div>
            <div class="grid-menu"><div class="menu-btn" onclick="showScreen('ladder')"><span>🪜</span>Ladder</div><div class="menu-btn" onclick="showScreen('addition')"><span>➕</span>Addition</div><div class="menu-btn" onclick="showScreen('shop')"><span>🛒</span>Shop</div><div class="menu-btn" onclick="showScreen('achievements')"><span>🏆</span>Achievements</div><div class="menu-btn" onclick="showScreen('profile')"><span>👤</span>Profile</div></div>
        </div>
        <!-- ladder screen -->
        <div id="screen-ladder" class="screen"><div class="top-bar"><div class="avatar-small">🪜</div><div class="coin-badge">🪙<span id="ladderCoin">0</span></div><div class="level-badge">mode</div></div><div class="ladder-box"><div id="ladderModeInfo">Free mode</div><div class="ladder-steps" id="ladderSteps"></div><div class="counter-row"><div class="chip" onclick="ladderJumpDown()">◀️ down</div><div class="chip" onclick="ladderJumpUp()">up ▶️</div></div><div style="display:flex; gap:8px; flex-wrap:wrap;"><button onclick="startFreeLadder()">free</button><button onclick="startTargetLadder()">target</button><button onclick="startSpeedLadder()">speed</button></div><button onclick="showScreen('home')">🏠</button></div></div>
        <!-- addition screen -->
        <div id="screen-addition" class="screen"><div class="top-bar"><div>➕</div><div class="coin-badge">🪙<span class="coin-display">0</span></div></div><div class="addition-box"><div class="circle-group"><div class="circle blue" id="addNum1">3</div><div class="circle orange" id="addNum2">2</div></div><div class="big-number">?</div><input id="addResult" type="number" placeholder="sum" inputmode="numeric"><div style="display:flex; gap:8px;"><button onclick="checkAddition()">check</button><button onclick="hintAddition()">hint (1🪙)</button></div><div id="addFeedback"></div><div>combo: <span id="comboDisplay">0</span></div><button onclick="showScreen('home')">🏠</button></div></div>
        <!-- shop screen -->
        <div id="screen-shop" class="screen"><div class="top-bar"><div>🛒</div><div class="coin-badge">🪙<span class="coin-display">0</span></div></div><div id="shopContainer" class="shop-grid"></div><button onclick="showScreen('home')">🏠</button></div>
        <!-- achievements screen -->
        <div id="screen-achievements" class="screen"><div class="top-bar"><div>🏆</div></div><div id="achieveList" class="achieve-grid"></div><button onclick="showScreen('home')">🏠</button></div>
        <!-- profile screen -->
        <div id="screen-profile" class="screen"><div class="top-bar"><div>👤</div><div class="coin-badge">🪙<span class="coin-display">0</span></div></div><input id="profileName" value="Explorer"><button onclick="saveProfileName()">save</button><div class="stat-row"><span>Level</span><span id="profileLevel">2</span></div><div class="stat-row"><span>total coins</span><span id="profileCoinsTotal">0</span></div><div class="stat-row"><span>games</span><span id="profileGames">0</span></div><div class="stat-row"><span>accuracy</span><span id="profileAccuracy">0%</span></div><div class="xp-bar"><div class="xp-fill" style="width:35%"></div></div><button onclick="resetProgress()">reset progress</button><button onclick="showScreen('home')">🏠</button></div>
    `;
    // reconnect screens
    screens.home = document.getElementById('screen-home');
    screens.ladder = document.getElementById('screen-ladder');
    screens.addition = document.getElementById('screen-addition');
    screens.shop = document.getElementById('screen-shop');
    screens.achievements = document.getElementById('screen-achievements');
    screens.profile = document.getElementById('screen-profile');
    updateHomeUI();
    saveState();
})();
</script>
</body>
</html>
