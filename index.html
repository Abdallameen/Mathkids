<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>عالم مغامرات الرياضيات ✦ السلم التفاعلي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1e2b4a 0%, #2a1e4a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
            overflow-x: hidden;
            direction: ltr; /* للتأكد من أن اتجاه السلم من اليسار لليمين */
        }
        /* عناصر خلفية عائمة */
        .float-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }
        .float-bg span {
            position: absolute;
            display: block;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 180, 0.03);
            border-radius: 60% 40% 70% 30%;
            animation: floatAnim 20s infinite ease-in-out;
        }
        @keyframes floatAnim {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-120px) rotate(180deg); }
            100% { transform: translateY(0px) rotate(360deg); }
        }

        /* الحاوية الرئيسية للتطبيق */
        #app {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            background: rgba(20, 15, 35, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 50px 50px 40px 40px;
            box-shadow: 0 25px 50px -8px rgba(0,0,0,0.8), 0 0 0 2px rgba(255,215,100,0.15);
            overflow: hidden;
            border: 1px solid rgba(255,215,100,0.2);
        }
        .screen {
            display: none;
            padding: 20px 16px 25px;
            flex-direction: column;
            gap: 20px;
            min-height: 680px;
        }
        .screen.active {
            display: flex;
            animation: fadeSlide 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
        }
        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateX(20px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        /* الشريط العلوي */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.35);
            padding: 8px 16px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,220,150,0.2);
        }
        .avatar-small {
            width: 48px;
            height: 48px;
            background: #b48aff;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 6px 0 #5a4a8a;
        }
        .coin-badge {
            background: #f5c542;
            padding: 6px 18px 6px 14px;
            border-radius: 40px;
            font-weight: 700;
            color: #1e172f;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1.2rem;
            box-shadow: 0 5px 0 #b87c1b;
        }
        .level-badge {
            background: #4d3590;
            padding: 6px 16px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid #dbbd7a;
        }

        /* قسم السلم (الدرج) */
        .ladder-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 70px;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #ffffff20;
            box-shadow: inset 0 2px 8px #00000055;
        }

        /* حاوية الدرج - من اليسار إلى اليمين */
        .steps-row {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-end; /* الدرج يرتفع كلما اتجهنا لليمين */
            gap: 8px;
            flex-wrap: wrap;
            margin: 25px 0 30px;
            width: 100%;
            min-height: 170px;
        }

        /* شكل الدرجة الواحدة */
        .step-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            width: 50px;
            background: #4e4180;
            border-radius: 20px 20px 12px 12px;
            border-bottom: 6px solid #241f3a;
            color: white;
            font-weight: 800;
            font-size: 1.3rem;
            transition: all 0.15s ease;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.4);
            cursor: pointer;
            padding-bottom: 8px;
            position: relative;
        }

        /* ارتفاع الدرج يتدرج من اليسار (الأقل) إلى اليمين (الأعلى) */
        .step-block[data-value="0"] { height: 40px; background: #6a5e9e; }
        .step-block[data-value="1"] { height: 48px; }
        .step-block[data-value="2"] { height: 56px; }
        .step-block[data-value="3"] { height: 64px; }
        .step-block[data-value="4"] { height: 72px; }
        .step-block[data-value="5"] { height: 80px; }
        .step-block[data-value="6"] { height: 88px; }
        .step-block[data-value="7"] { height: 96px; }
        .step-block[data-value="8"] { height: 104px; }
        .step-block[data-value="9"] { height: 112px; }
        .step-block[data-value="10"] { height: 120px; }
        .step-block[data-value="11"] { height: 128px; }
        .step-block[data-value="12"] { height: 136px; }
        .step-block[data-value="13"] { height: 144px; }
        .step-block[data-value="14"] { height: 152px; }
        .step-block[data-value="15"] { height: 160px; }
        .step-block[data-value="16"] { height: 168px; }
        .step-block[data-value="17"] { height: 176px; }
        .step-block[data-value="18"] { height: 184px; }
        .step-block[data-value="19"] { height: 192px; }
        .step-block[data-value="20"] { height: 200px; background: #c89f4a; border-bottom-color: #926d25; }

        /* الدرجة الحالية (الشخصية) */
        .step-block.current-step {
            background: #fbca4a !important;
            border-bottom: 6px solid #b47d1f !important;
            color: #1f172b;
            transform: scale(1.08);
            box-shadow: 0 0 25px #fde16d, 0 6px 0 #9e701b;
            z-index: 5;
        }

        /* شخصية صغيرة تقفز على الدرجة */
        .step-block.current-step::after {
            content: "🐰";
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 34px;
            filter: drop-shadow(0 8px 4px #00000060);
            animation: bounceChar 0.6s infinite alternate ease-in-out;
        }
        @keyframes bounceChar {
            0% { top: -32px; }
            100% { top: -42px; }
        }

        /* أزرار التحكم */
        .arrow-controls {
            display: flex;
            gap: 35px;
            margin: 15px 0 20px;
        }
        .arrow-btn {
            background: #4d3590;
            width: 75px;
            height: 75px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.8rem;
            box-shadow: 0 10px 0 #2d1f58, 0 10px 25px black;
            transition: 0.05s linear;
            cursor: pointer;
            border: 2px solid #bc9eff;
        }
        .arrow-btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #2d1f58, 0 8px 20px black;
        }
        .mode-badge {
            background: #2c254b;
            padding: 12px 18px;
            border-radius: 50px;
            color: #ffdf91;
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* باقي العناصر (شاشات أخرى) تبقى كما هي مع تحسينات بسيطة */
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 12px;
        }
        .menu-btn {
            background: rgba(35, 25, 60, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 100, 0.3);
            border-radius: 32px;
            padding: 24px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            font-size: 1.3rem;
            font-weight: 600;
            color: #ffefc0;
            box-shadow: 0 12px 0 #0f0b22, 0 8px 20px black;
            transition: 0.08s linear;
            cursor: pointer;
        }
        .menu-btn:active { transform: translateY(6px); box-shadow: 0 4px 0 #0f0b22; }
        .menu-btn span { font-size: 2.5rem; }

        /* باقي الأنماط (المتجر، الإنجازات، الملف الشخصي) مستمرة ولكن اختصاراً سأبقيها بنفس التصميم السابق مع بعض التعديلات البسيطة */
        .shop-grid, .achieve-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
        .shop-item, .achieve-item { background: #2c234a; border-radius: 30px; padding: 15px; text-align: center; color: white; border: 2px solid #ffffff30; }
        .owned { border-color: gold; background: #4d3c7a; }
        button { background: #7359d1; border: none; padding: 16px 20px; border-radius: 50px; font-weight: 700; color: white; font-size: 1.2rem; box-shadow: 0 7px 0 #3f2e81; transition: 0.05s; cursor: pointer; margin: 5px; }
        button:active { transform: translateY(5px); box-shadow: 0 2px 0 #3f2e81; }
        .xp-bar { height: 20px; background: #181530; border-radius: 30px; width: 100%; }
        .xp-fill { height: 100%; background: linear-gradient(90deg, #c58aff, #f5c542); border-radius: 30px; width: 0%; transition: width 0.3s; }
        .coin-display, .level-num { font-weight: 700; }
        #confettiCanvas { position: fixed; top:0; left:0; pointer-events: none; z-index: 999; }
    </style>
</head>
<body>
<div class="float-bg" id="floatingBg"></div>
<div id="app"></div>
<canvas id="confettiCanvas"></canvas>
<script>
(function() {
    // --------------------------------------------------------------
    // الحالة الأساسية والحفظ في التخزين المحلي (نفس الهيكل السابق)
    const STORAGE_KEY = 'mathAdventureWorld_advanced';
    const defaultState = {
        coins: 75,
        level: 2,
        xp: 45,
        maxLevel: 5,
        playerName: 'مستكشف',
        character: 'bunny',
        theme: 'default',
        ownedItems: { characters: ['bunny'], themes: ['default'], soundPacks: ['classic'] },
        achievements: [],
        stats: { gamesPlayed: 0, correct: 0, totalAnswers: 0, coinsEarned: 0 },
        ladder: { currentStep: 0, targetMode: 'free', targetNumber: null }, // نبدأ من 0
    };

    let state = JSON.parse(JSON.stringify(defaultState));
    try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) state = { ...defaultState, ...JSON.parse(saved), ownedItems: { ...defaultState.ownedItems, ...JSON.parse(saved).ownedItems } };
    } catch (e) { }

    function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    // --------------------------------------------------------------
    // نظام الصوت البسيط
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    function playTone(type, freq, duration, vol = 0.1) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = vol;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }
    const sounds = {
        click: () => playTone('sine', 650, 0.07, 0.06),
        success: () => { playTone('sine', 900, 0.12); playTone('sine', 1200, 0.15, 0.06); },
        error: () => playTone('sawtooth', 320, 0.15, 0.08),
        jump: () => playTone('triangle', 550, 0.07, 0.1),
        celebrate: () => { playTone('sine', 780, 0.1); playTone('sine', 1100, 0.2, 0.1); }
    };

    // --------------------------------------------------------------
    // نظام الكونفيتي (نفس السابق)
    const canvas = document.getElementById('confettiCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();
    function addConfetti(amount = 15) {
        for (let i = 0; i < amount; i++) particles.push({ x: Math.random() * canvas.width, y: -20, size: 7 + Math.random() * 12, color: `hsl(${Math.random() * 360}, 80%, 60%)`, speedY: 2 + Math.random() * 8, speedX: -2 + Math.random() * 4, life: 1 });
        if (!confettiFrame) requestAnimationFrame(animateConfetti);
    }
    let confettiFrame;
    function animateConfetti() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let anyAlive = false;
        particles = particles.filter(p => {
            p.x += p.speedX; p.y += p.speedY; p.life -= 0.004;
            if (p.life <= 0 || p.y > canvas.height + 50) return false;
            anyAlive = true;
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.size * 0.8, p.size * 0.4);
            return true;
        });
        if (anyAlive) confettiFrame = requestAnimationFrame(animateConfetti); else confettiFrame = null;
    }

    // --------------------------------------------------------------
    // مدير الشاشات
    let screens = {};
    function showScreen(name) {
        Object.values(screens).forEach(s => { if (s) s.classList.remove('active'); });
        if (screens[name]) screens[name].classList.add('active');
        sounds.click();
        if (name === 'home') updateHomeUI();
        if (name === 'ladder') renderLadderScreen();
        if (name === 'shop') renderShop();
        if (name === 'achievements') renderAchievements();
        if (name === 'profile') renderProfile();
    }

    // --------------------------------------------------------------
    // تحديث واجهة الرئيسية
    function updateHomeUI() {
        document.querySelectorAll('.coin-display').forEach(el => el.innerText = state.coins);
        document.querySelectorAll('.level-num').forEach(el => el.innerText = state.level);
        const avatar = document.getElementById('avatarHome');
        if (avatar) avatar.innerText = state.character === 'bunny' ? '🐰' : state.character === 'robot' ? '🤖' : state.character === 'dino' ? '🦖' : '👨‍🚀';
    }

    // --------------------------------------------------------------
    // شاشة السلم (الدرج) - التصميم الجديد
    function renderLadderScreen() {
        const container = document.getElementById('ladderStepsRow');
        if (!container) return;
        const maxStep = state.level >= 3 ? 20 : (state.level >= 2 ? 10 : 5);
        // التأكد أن الخطوة الحالية ضمن الحدود
        if (state.ladder.currentStep > maxStep) state.ladder.currentStep = maxStep;
        let stepsHtml = '';
        for (let i = 0; i <= maxStep; i++) {
            stepsHtml += `<div class="step-block ${state.ladder.currentStep === i ? 'current-step' : ''}" data-value="${i}" onclick="jumpToStep(${i})">${i}</div>`;
        }
        container.innerHTML = stepsHtml;
        document.getElementById('ladderCoin').innerText = state.coins;
        document.getElementById('ladderModeText').innerText = 
            state.ladder.targetMode === 'target' && state.ladder.targetNumber !== null ? `🎯 هدف: ${state.ladder.targetNumber}` : 
            state.ladder.targetMode === 'speed' ? '⚡ سباق' : '✨ حر';
        updateTargetHighlight();
    }

    // تحديث إضاءة الهدف إذا كان موجوداً
    function updateTargetHighlight() {
        if (state.ladder.targetMode === 'target' && state.ladder.targetNumber !== null) {
            const targetStep = document.querySelector(`.step-block[data-value="${state.ladder.targetNumber}"]`);
            if (targetStep) targetStep.style.boxShadow = '0 0 0 4px #ffb347, 0 0 25px gold';
        }
    }

    // القفز إلى خطوة محددة (باللمس على الدرجة)
    window.jumpToStep = function(step) {
        const maxStep = state.level >= 3 ? 20 : (state.level >= 2 ? 10 : 5);
        if (step < 0 || step > maxStep) return;
        state.ladder.currentStep = step;
        sounds.jump();
        renderLadderScreen(); // إعادة رسم لتحديث موقع الشخصية

        // التحقق من الوصول للهدف في وضع target
        if (state.ladder.targetMode === 'target' && state.ladder.targetNumber === step) {
            sounds.success();
            state.coins += 5;
            state.stats.coinsEarned += 5;
            addConfetti(10);
            state.ladder.targetMode = 'free'; // إنهاء الوضع
            state.ladder.targetNumber = null;
            document.getElementById('ladderModeText').innerText = '✨ حر';
            updateHomeUI();
        }
        saveState();
    };

    // تحريك بالسهم الأيسر
    window.moveLeft = function() {
        const maxStep = state.level >= 3 ? 20 : (state.level >= 2 ? 10 : 5);
        const newStep = Math.max(0, state.ladder.currentStep - 1);
        window.jumpToStep(newStep);
    };
    // تحريك بالسهم الأيمن
    window.moveRight = function() {
        const maxStep = state.level >= 3 ? 20 : (state.level >= 2 ? 10 : 5);
        const newStep = Math.min(maxStep, state.ladder.currentStep + 1);
        window.jumpToStep(newStep);
    };

    // أوضاع السلم
    window.setLadderMode = function(mode) {
        if (mode === 'free') {
            state.ladder.targetMode = 'free';
            state.ladder.targetNumber = null;
        } else if (mode === 'target') {
            const maxStep = state.level >= 3 ? 20 : (state.level >= 2 ? 10 : 5);
            state.ladder.targetMode = 'target';
            state.ladder.targetNumber = Math.floor(Math.random() * (maxStep - 1)) + 1; // من 1 إلى maxStep
        } else if (mode === 'speed') {
            state.ladder.targetMode = 'speed';
            // يمكن تنفيذ توقيت لاحقاً (للتبسيط نكتفي بالإشارة)
        }
        sounds.click();
        renderLadderScreen();
        saveState();
    };

    // --------------------------------------------------------------
    // المتجر والإنجازات والملف الشخصي (مبسطة ولكن كاملة)
    const shopItems = {
        characters: { bunny: 0, robot: 50, dino: 100, astronaut: 150 },
        themes: { default: 0, space: 80, jungle: 120, candy: 150 },
    };
    function renderShop() {
        const container = document.getElementById('shopContainer');
        if (!container) return;
        let html = '';
        for (let [cat, items] of Object.entries(shopItems)) {
            for (let [name, price] of Object.entries(items)) {
                const owned = (cat === 'characters' && state.ownedItems.characters.includes(name)) ||
                              (cat === 'themes' && state.ownedItems.themes.includes(name));
                html += `<div class="shop-item ${owned ? 'owned' : ''}" data-cat="${cat}" data-item="${name}" data-price="${price}">
                    <span style="font-size:2.5rem;">${name === 'bunny' ? '🐰' : name === 'robot' ? '🤖' : name === 'dino' ? '🦖' : name === 'astronaut' ? '👨‍🚀' : name === 'default' ? '☁️' : name === 'space' ? '🚀' : name === 'jungle' ? '🌴' : '🍭'}</span>
                    <div>${name}</div>
                    <div class="price">${owned ? '✓ تملك' : price + '🪙'}</div>
                </div>`;
            }
        }
        container.innerHTML = html;
        document.querySelectorAll('.shop-item').forEach(el => {
            el.addEventListener('click', () => {
                const cat = el.dataset.cat, item = el.dataset.item, price = parseInt(el.dataset.price, 10);
                let ownedArr = cat === 'characters' ? state.ownedItems.characters : state.ownedItems.themes;
                if (ownedArr.includes(item)) {
                    if (cat === 'characters') state.character = item;
                    sounds.click();
                } else if (state.coins >= price) {
                    state.coins -= price;
                    ownedArr.push(item);
                    sounds.celebrate();
                    addConfetti(12);
                    if (cat === 'characters') state.character = item;
                    saveState(); renderShop(); updateHomeUI();
                } else { sounds.error(); }
            });
        });
    }

    function renderAchievements() {
        const list = document.getElementById('achieveList');
        if (!list) return;
        const all = ['🏆 أول فوز', '🔟 إجابات صحيحة', '🔥 5 متتالية', '💰 100 قطعة', '🪜 سيد السلم'];
        const unlocked = state.achievements || [];
        list.innerHTML = all.map((a, i) => `<div class="achieve-item ${unlocked.includes(i) ? 'unlocked' : ''}">${a}</div>`).join('');
    }

    function renderProfile() {
        document.getElementById('profileName').value = state.playerName;
        document.getElementById('profileLevel').innerText = state.level;
        document.getElementById('profileCoinsTotal').innerText = state.stats.coinsEarned;
        document.getElementById('profileGames').innerText = state.stats.gamesPlayed;
        const acc = state.stats.totalAnswers ? Math.round((state.stats.correct / state.stats.totalAnswers) * 100) : 0;
        document.getElementById('profileAccuracy').innerText = acc + '%';
        document.getElementById('xpFill').style.width = (state.xp % 100) + '%';
    }
    window.saveProfileName = function() {
        const newName = document.getElementById('profileName').value;
        if (newName) state.playerName = newName;
        saveState(); sounds.click();
    };
    window.resetProgress = function() {
        if (confirm('مسح كل التقدم؟')) {
            state = JSON.parse(JSON.stringify(defaultState));
            saveState(); updateHomeUI(); showScreen('home');
        }
    };

    // --------------------------------------------------------------
    // إنشاء واجهة التطبيق ديناميكياً
    document.getElementById('app').innerHTML = `
        <!-- الشاشة الرئيسية -->
        <div id="screen-home" class="screen active">
            <div class="top-bar"><div class="avatar-small" id="avatarHome">🐰</div><div class="coin-badge"><span>🪙</span><span class="coin-display">${state.coins}</span></div><div class="level-badge"><span>مستوى </span><span class="level-num">${state.level}</span></div></div>
            <div style="font-size:2.4rem; font-weight:800; text-align:center; color:#fade7a; text-shadow:0 5px 0 #7f5d38;">عالم الرياضيات</div>
            <div class="grid-menu">
                <div class="menu-btn" onclick="showScreen('ladder')"><span>🪜</span>السلم</div>
                <div class="menu-btn" onclick="showScreen('shop')"><span>🛒</span>المتجر</div>
                <div class="menu-btn" onclick="showScreen('achievements')"><span>🏆</span>الإنجازات</div>
                <div class="menu-btn" onclick="showScreen('profile')"><span>👤</span>الملف</div>
            </div>
        </div>

        <!-- شاشة السلم (الدرج) -->
        <div id="screen-ladder" class="screen">
            <div class="top-bar"><div class="avatar-small">🪜</div><div class="coin-badge">🪙<span id="ladderCoin">${state.coins}</span></div><div class="level-badge">الدرج</div></div>
            <div class="ladder-container">
                <div class="mode-badge" id="ladderModeText">${state.ladder.targetMode === 'target' ? '🎯 هدف: '+state.ladder.targetNumber : state.ladder.targetMode === 'speed' ? '⚡ سباق' : '✨ حر'}</div>
                <div class="steps-row" id="ladderStepsRow"></div>
                <div class="arrow-controls">
                    <div class="arrow-btn" onclick="moveLeft()">◀️</div>
                    <div class="arrow-btn" onclick="moveRight()">▶️</div>
                </div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
                    <button onclick="setLadderMode('free')">حر</button>
                    <button onclick="setLadderMode('target')">هدف</button>
                    <button onclick="setLadderMode('speed')">سباق</button>
                </div>
                <button onclick="showScreen('home')">العودة</button>
            </div>
        </div>

        <!-- شاشة المتجر (مختصرة) -->
        <div id="screen-shop" class="screen">
            <div class="top-bar"><div>🛒</div><div class="coin-badge">🪙<span class="coin-display">${state.coins}</span></div></div>
            <div id="shopContainer" class="shop-grid"></div>
            <button onclick="showScreen('home')">العودة</button>
        </div>

        <!-- شاشة الإنجازات -->
        <div id="screen-achievements" class="screen">
            <div class="top-bar"><div>🏆</div></div>
            <div id="achieveList" class="achieve-grid"></div>
            <button onclick="showScreen('home')">العودة</button>
        </div>

        <!-- شاشة الملف الشخصي -->
        <div id="screen-profile" class="screen">
            <div class="top-bar"><div>👤</div><div class="coin-badge">🪙<span class="coin-display">${state.coins}</span></div></div>
            <input id="profileName" value="${state.playerName}" placeholder="الاسم">
            <button onclick="saveProfileName()">حفظ</button>
            <div class="stat-row"><span>المستوى</span><span id="profileLevel">${state.level}</span></div>
            <div class="stat-row"><span>إجمالي القطع</span><span id="profileCoinsTotal">${state.stats.coinsEarned}</span></div>
            <div class="stat-row"><span>الألعاب</span><span id="profileGames">${state.stats.gamesPlayed}</span></div>
            <div class="stat-row"><span>الدقة</span><span id="profileAccuracy">0%</span></div>
            <div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:${state.xp%100}%"></div></div>
            <button onclick="resetProgress()">إعادة تعيين</button>
            <button onclick="showScreen('home')">العودة</button>
        </div>
    `;

    // إعادة ربط الشاشات
    screens = {
        home: document.getElementById('screen-home'),
        ladder: document.getElementById('screen-ladder'),
        shop: document.getElementById('screen-shop'),
        achievements: document.getElementById('screen-achievements'),
        profile: document.getElementById('screen-profile')
    };

    // تهيئة الخلفية العائمة
    for (let i = 0; i < 12; i++) {
        let sp = document.createElement('span');
        sp.style.left = Math.random() * 100 + '%';
        sp.style.top = Math.random() * 100 + '%';
        sp.style.width = (15 + Math.random() * 60) + 'px';
        sp.style.animationDuration = (12 + Math.random() * 20) + 's';
        document.getElementById('floatingBg').appendChild(sp);
    }

    // عرض الشاشة الافتراضية
    showScreen('home');
    saveState();

    // تصدير الدوال الضرورية
    window.showScreen = showScreen;
})();
</script>
</body>
</html>
