<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Adventure World 🌟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #2b1b4e;
            padding: 8px;
        }
        #game-container {
            width: 100%;
            max-width: 480px;
            height: 820px;
            background: radial-gradient(circle at top left, #8a6de9, #4a2d8c);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 30px 30px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.3);
            overflow: hidden;
            position: relative;
            border: 4px solid #ffc857;
        }
        /* floating shapes */
        .floating-shape {
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(255,215,100,0.2);
            border-radius: 60% 40% 70% 30%;
            top: 10%;
            left: 10%;
            filter: blur(40px);
            animation: float 12s infinite alternate;
            z-index: 0;
            pointer-events: none;
        }
        .shape2 {
            background: rgba(255,140,200,0.25);
            width: 200px;
            height: 200px;
            bottom: 0;
            right: 0;
            top: auto;
            left: auto;
            animation: float2 15s infinite;
        }
        @keyframes float {
            0% { transform: translate(0,0) rotate(0deg); }
            100% { transform: translate(60px, 40px) rotate(30deg); }
        }
        @keyframes float2 {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(-50px, -30px) scale(1.2); }
        }
        /* main UI */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, opacity 0.25s;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(2px);
            overflow-y: auto;
            z-index: 10;
        }
        .hidden-screen {
            transform: translateX(30px);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }
        /* header / coin row */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(4px);
            padding: 8px 12px;
            border-radius: 60px;
            margin-bottom: 10px;
            border: 2px solid #ffdb9d;
            box-shadow: 0 6px 0 #a57348;
        }
        .coin-display {
            background: #fbbf24;
            padding: 6px 20px 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            color: #3a2800;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1.2rem;
            border: 2px solid #ffecb0;
            box-shadow: inset 0 -3px 0 #b57c1a;
        }
        .avatar-small {
            width: 44px; height: 44px;
            background: #fcd34d;
            border-radius: 50%;
            border: 3px solid white;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="45" r="25" fill="%23f1c40f"/><circle cx="35" cy="40" r="5" fill="black"/><circle cx="65" cy="40" r="5" fill="black"/><path d="M40 60 Q50 70 60 60" stroke="black" stroke-width="4" fill="none"/></svg>');
            background-size: cover;
        }
        .xp-bar-container {
            width: 100%;
            height: 14px;
            background: #3f2e1a;
            border-radius: 20px;
            margin: 12px 0 14px;
            border: 2px solid #eab676;
            overflow: hidden;
        }
        .xp-fill {
            width: 40%; height: 100%;
            background: linear-gradient(90deg, #fbff2e, #f9b81b);
            border-radius: 20px;
            transition: width 0.3s ease;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin: 16px 0;
        }
        .primary-btn {
            background: #fee89e;
            border: 4px solid #fff1c7;
            padding: 20px 0;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1.3rem;
            color: #3d2b10;
            box-shadow: 0 8px 0 #b28234, 0 8px 15px black;
            transition: 0.05s linear;
            text-align: center;
            cursor: pointer;
        }
        .primary-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #b28234;
        }
        .icon-btn {
            background: #a989dc;
            padding: 16px 0;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px solid #ffe6a6;
            box-shadow: 0 5px 0 #533e7a;
            color: white;
        }
        /* Stairs viewport */
        .stairs-scene {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #5f43a3;
            border-radius: 50px 50px 30px 30px;
            border: 5px solid #fec65f;
            margin-bottom: 10px;
        }
        .camera {
            height: 100%;
            width: 100%;
            display: flex;
            align-items: flex-end;
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            will-change: transform;
        }
        .stair-row {
            display: flex;
            align-items: flex-end;
            height: 100%;
            padding-left: 20px;
            gap: 6px;
        }
        .step {
            min-width: 70px;
            height: calc(40px + 5 * var(--step));
            background: linear-gradient(145deg, #fbbf24, #d97706);
            border-top: 6px solid #ffd966;
            border-radius: 30px 30px 0 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-size: 52px;
            font-weight: 800;
            color: white;
            text-shadow: 4px 4px 0 #a75800;
            box-shadow: 0 -8px 0 #b25700, 0 12px 15px rgba(0,0,0,0.3);
            transition: box-shadow 0.2s, transform 0.2s;
            transform-origin: bottom;
            padding-top: 5px;
        }
        .step-glow {
            box-shadow: 0 0 0 5px #ffeb99, 0 -8px 0 #b25700, 0 12px 15px black;
            transform: scale(1.05);
            z-index: 20;
        }
        .character {
            position: absolute;
            bottom: 0; left: 0;
            width: 60px; height: 60px;
            background: #f2c94c;
            border-radius: 50% 50% 20px 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="40" r="27" fill="%23f5d742"/><circle cx="35" cy="32" r="5" fill="black"/><circle cx="65" cy="32" r="5" fill="black"/><ellipse cx="50" cy="55" rx="12" ry="7" fill="%23cf9f2b"/></svg>');
            background-size: cover;
            transition: bottom 0.15s, left 0.2s;
            filter: drop-shadow(0 10px 5px #00000066);
            z-index: 50;
        }
        .jump {
            animation: hop 0.25s ease-out;
        }
        @keyframes hop {
            0% { bottom: 0px; } 40% { bottom: 30px; } 100% { bottom: 0px; }
        }
        .arrow-panel {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 8px 0;
        }
        .arrow {
            background: #263f6b;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: white;
            border: 5px solid #91b9ff;
            box-shadow: 0 7px 0 #0f2642;
            cursor: pointer;
        }
        .arrow:active { transform: translateY(7px); box-shadow: none; }
        .challenge-badge {
            background: #f97316;
            padding: 6px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            text-align: center;
        }
        .particle-container { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 999; }
        .particle { position: absolute; width: 8px; height: 8px; background: gold; border-radius: 50%; }
        .confetti { background: #f00; width: 10px; height: 10px; }
        /* shop items */
        .shop-item {
            background: #ece2fe;
            border-radius: 30px;
            padding: 12px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .purchase-btn { background: #4caf50; padding: 10px 20px; border-radius: 50px; font-weight: bold; }
        /* etc */
        .profile-stat { background: #31255a; padding: 16px; border-radius: 28px; color: white; margin: 8px 0; }
        input { background: white; border: none; padding: 10px; border-radius: 50px; width: 100%; }
    </style>
</head>
<body>
<div id="game-container">
    <div class="floating-shape"></div><div class="floating-shape shape2"></div>

    <!-- App state & screens are built in JS; but we embed minimal skeleton -->
    <div id="app"></div>
</div>
<script>
(function() {
    // ------------------ SOUND MANAGER (dummy, no external files) --------------
    class SoundManager {
        constructor() { this.enabled = true; }
        play(type) {
            if (!this.enabled) return;
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.connect(gain);
            gain.connect(ctx.destination);
            let freq = 400, dur = 0.1;
            if (type === 'step') { freq = 300; dur = 0.08; }
            else if (type === 'correct') { freq = 800; dur = 0.15; }
            else if (type === 'wrong') { freq = 200; dur = 0.2; gain.gain.value = 0.3; }
            else if (type === 'buy') { freq = 600; dur = 0.2; }
            else if (type === 'achievement') { freq = 1000; dur = 0.3; }
            else if (type === 'click') { freq = 500; dur = 0.05; }
            osc.frequency.value = freq;
            gain.gain.value = 0.2;
            osc.start();
            osc.stop(ctx.currentTime + dur);
            ctx.close(); // allow multiple
        }
    }

    // ------------------ STORAGE --------------------
    const STORAGE_KEY = 'mathAdvWorld';
    class StorageManager {
        static load() {
            const defaultData = { coins: 120, xp: 0, level: 1, ownedChar: ['bunny'], selectedChar: 'bunny', ownedTheme: ['default'], selectedTheme: 'default', achievements: [], stats: {games:0, correct:0, total:0}, charUnlocks: {}, lastDaily: 0 };
            try {
                const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
                return { ...defaultData, ...saved };
            } catch { return defaultData; }
        }
        static save(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
    }

    // ------------------ APP STATE (CENTRAL) ----------
    const AppState = { 
        ...StorageManager.load(),
        currentScreen: 'home',
        stairMode: 'explore', // explore / target / backward
        targetNumber: 15,
        currentStep: 0,
        stairLevelMax: 20,
        moveCooldown: false,
        achievementsList: ['First Movement', 'Reach 20', '10 Correct', '5 Combo', '100 Coins', 'Stair Master'],
        xpRequired: [0, 100, 250, 500, 1000],
    };
    // achievement simple check
    function updateAchievement(ach) { if (!AppState.achievements.includes(ach)) { AppState.achievements.push(ach); sm.play('achievement'); showParticles('confetti'); } }

    // confetti / particle
    function showParticles(type='sparkle') {
        const container = document.querySelector('.particle-container') || (()=>{ const d = document.createElement('div'); d.className='particle-container'; document.getElementById('game-container').appendChild(d); return d; })();
        for (let i=0;i<25;i++) {
            const p = document.createElement('div'); p.className = 'particle' + (type==='confetti'?' confetti':'');
            p.style.left = Math.random()*100+'%'; p.style.top = Math.random()*100+'%'; p.style.background = `hsl(${Math.random()*360},80%,60%)`; p.style.width='12px'; p.style.height='12px';
            container.appendChild(p);
            setTimeout(()=>p.remove(), 1000);
        }
    }

    const sm = new SoundManager();

    // ------------------ SCREENS RENDER ---------------
    function renderScreen() {
        const app = document.getElementById('app');
        if (!app) return;
        let html = '';
        const screen = AppState.currentScreen;
        // always show top bar except maybe inside stairs? but we keep inside stairs too.
        const coinXP = `<div class="top-bar"><div class="avatar-small"></div><div class="coin-display">🪙 ${AppState.coins}</div></div><div class="xp-bar-container"><div class="xp-fill" style="width:${AppState.xp % 100}%"></div></div>`;

        if (screen === 'home') {
            html = `<div class="screen"><div class="floating-shape"></div>${coinXP}<div style="font-size:40px; font-weight:900; color:#ffeeb0; text-shadow:6px 6px 0#a75800; text-align:center;">📐 Math<br>Adventure</div>
            <div class="btn-grid"><div class="primary-btn" data-screen="ladder">🪜 Stairs</div><div class="primary-btn" data-screen="addition">➕ Addition</div><div class="primary-btn icon-btn" data-screen="shop">🛒 Shop</div><div class="primary-btn icon-btn" data-screen="achievements">🏆 Achievements</div><div class="primary-btn icon-btn" data-screen="profile">👤 Profile</div></div></div>`;
        }
        else if (screen === 'ladder') {
            let stepsHtml = '';
            for (let i=0; i<=AppState.stairLevelMax; i++) {
                const glow = (i===AppState.currentStep) ? 'step-glow' : '';
                stepsHtml += `<div class="step ${glow}" style="--step:${i}; height:${60 + i*5}px;" data-step="${i}">${i}</div>`;
            }
            const cameraX = Math.min(0, Math.max(-(AppState.currentStep * 70 - 150), -1200)); // crude follow
            html = `<div class="screen">${coinXP}
                <div class="stairs-scene">
                    <div class="camera" style="transform:translateX(${cameraX}px)">
                        <div class="stair-row">${stepsHtml}</div>
                    </div>
                    <div class="character" id="game-character" style="left: ${AppState.currentStep * 70 + 25}px; bottom: ${45 + AppState.currentStep*2}px;"></div>
                </div>
                <div class="challenge-badge">Mode: ${AppState.stairMode} ${AppState.stairMode==='target'?'Goal '+AppState.targetNumber:''}</div>
                <div class="arrow-panel">
                    <div class="arrow" id="move-left">←</div>
                    <div class="arrow" id="move-right">→</div>
                </div>
                <div style="display:flex; gap:6px;"><button class="primary-btn" data-mode="explore">🎲 Explore</button><button class="primary-btn" data-mode="target">🎯 Target</button><button class="primary-btn" data-mode="backward">⬅️ Backward</button><button class="primary-btn" data-screen="home">🏠</button></div>
            </div>`;
        }
        else if (screen === 'shop') {
            const characters = [{name:'Bunny',price:0},{name:'Robot',price:50},{name:'Dino',price:100},{name:'Astronaut',price:150}];
            let items = ''; characters.forEach(c=> { items+=`<div class="shop-item">${c.name} 🪙${c.price} <button class="purchase-btn" data-item="${c.name}">Buy</button></div>`; });
            html = `<div class="screen">${coinXP}<h2 style="color:white;">🛒 Shop</h2>${items}<button class="primary-btn" data-screen="home">Back</button></div>`;
        }
        else if (screen === 'achievements') {
            let ach = ''; AppState.achievementsList.forEach(a=> { const unlocked = AppState.achievements.includes(a) ? '✅' : '🔒'; ach+=`<div style="background:#4f3e7a; padding:16px; border-radius:20px; margin:5px; color:white;">${unlocked} ${a}</div>`; });
            html = `<div class="screen">${coinXP}<h2>🏆 Achievements</h2>${ach}<button class="primary-btn" data-screen="home">Back</button></div>`;
        }
        else if (screen === 'profile') {
            html = `<div class="screen">${coinXP}<div class="profile-stat">👤 Name: <input value='Alex' placeholder='Player name'></div><div class="profile-stat">Level ${AppState.level}  Accuracy: 78%</div><div class="profile-stat">Games: ${AppState.stats.games || 0}</div><button class="primary-btn" id="resetProgress">🔄 Reset</button><button class="primary-btn" data-screen="home">Back</button></div>`;
        }
        else if (screen === 'addition') {
            html = `<div class="screen">${coinXP}<h2 style="color:white;">➕ Addition (demo)</h2><div style="background:#ffd966; border-radius: 60px; padding: 20px;">5 + 3 = ?</div><button class="primary-btn" data-screen="home">Back</button></div>`;
        }
        app.innerHTML = html;
        if (screen === 'ladder') {
            document.getElementById('move-left')?.addEventListener('click', ()=>moveCharacter(-1));
            document.getElementById('move-right')?.addEventListener('click', ()=>moveCharacter(1));
        }
        document.querySelectorAll('[data-screen]').forEach(b => {
            b.addEventListener('click', (e) => { sm.play('click'); AppState.currentScreen = e.target.dataset.screen; renderScreen(); });
        });
        document.querySelectorAll('[data-mode]').forEach(b => {
            b.addEventListener('click', (e) => { 
                sm.play('click'); 
                const mode = e.target.dataset.mode; 
                if (mode==='target') { AppState.stairMode = 'target'; AppState.targetNumber = 15; }
                else if (mode==='backward') { AppState.stairMode = 'backward'; AppState.currentStep = 20; }
                else { AppState.stairMode = 'explore'; AppState.currentStep = 0; }
                renderScreen(); 
            });
        });
        // purchase demo (simplified)
        document.querySelectorAll('.purchase-btn').forEach(b => {
            b.addEventListener('click', (e) => { 
                const price = e.target.innerText.match(/\d+/)?.[0] || 50;
                if (AppState.coins >= price) { AppState.coins -= Number(price); sm.play('buy'); StorageManager.save(AppState); renderScreen(); showParticles(); }
            });
        });
        document.getElementById('resetProgress')?.addEventListener('click', ()=> { localStorage.removeItem(STORAGE_KEY); location.reload(); });
        // keyboard & swipe
    }

    // movement logic
    function moveCharacter(delta) {
        if (AppState.moveCooldown) return;
        let newStep = AppState.currentStep + delta;
        if (newStep < 0 || newStep > AppState.stairLevelMax) return;
        AppState.moveCooldown = true;
        setTimeout(() => AppState.moveCooldown = false, 300);
        sm.play('step');
        const char = document.querySelector('.character');
        if (char) { char.classList.add('jump'); setTimeout(()=>char.classList.remove('jump'), 250); }
        AppState.currentStep = newStep;
        // achievements
        if (AppState.currentStep === 20) { showParticles('confetti'); updateAchievement('Reach 20'); AppState.coins += 5; }
        if (AppState.stairMode === 'target' && AppState.currentStep === AppState.targetNumber) { AppState.coins += 10; showParticles('confetti'); sm.play('correct'); }
        if (AppState.stairMode === 'backward' && AppState.currentStep === 0) { AppState.coins += 10; showParticles('confetti'); }
        StorageManager.save(AppState);
        renderScreen();
    }

    // keyboard
    window.addEventListener('keydown', (e) => {
        if (AppState.currentScreen !== 'ladder') return;
        if (e.key === 'ArrowLeft') { e.preventDefault(); moveCharacter(-1); }
        if (e.key === 'ArrowRight') { e.preventDefault(); moveCharacter(1); }
    });
    // swipe basic
    let touchX = 0;
    window.addEventListener('touchstart', (e) => { touchX = e.changedTouches[0].screenX; });
    window.addEventListener('touchend', (e) => {
        if (AppState.currentScreen !== 'ladder') return;
        let diff = e.changedTouches[0].screenX - touchX;
        if (Math.abs(diff) > 30) { diff > 0 ? moveCharacter(-1) : moveCharacter(1); } // left/right swipe intuitive? left means prev step? but we treat left = decrease step
    });

    // camera follow smooth plus demo init
    const init = () => {
        if (!AppState.achievements.length) { AppState.achievements = []; }
        renderScreen();
        setInterval(() => { // auto save
            StorageManager.save(AppState);
        }, 2000);
    };
    init();

    // additional particle container
    const partContainer = document.createElement('div'); partContainer.className = 'particle-container'; document.getElementById('game-container').appendChild(partContainer);
})();
</script>
</body>
</html>
